apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: lab-gateway
  namespace: default
  annotations:
    networking.gke.io/certmap: {{ .Values.certMap }}
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
    - name: http
      port: 80
      protocol: HTTP
