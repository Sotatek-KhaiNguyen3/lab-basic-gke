project: project-for-lab
region: asia-southeast1
domain: ""     # để trống, cập nhật sau khi có Gateway IP (dạng: 34-120-50-100.sslip.io)
certMap: ""    # để trống, cập nhật sau khi tạo cert map

backend:
  image: asia-southeast1-docker.pkg.dev/project-for-lab/my-app-repo/backend
  tag: latest
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

frontend:
  image: asia-southeast1-docker.pkg.dev/project-for-lab/my-app-repo/frontend
  tag: latest
  replicas: 2
  port: 80

db:
  host: "10.0.0.X"   # Private IP của Cloud SQL — cập nhật sau khi tạo instance
  name: appdb
  user: appuser
